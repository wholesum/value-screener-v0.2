# ==============================================================================
# SINGLE SOURCE OF TRUTH for every instrument this tool tracks.
#
# DISK BUDGET NOTE (read this if you're tight on space, e.g. PythonAnywhere's
# free 512MB quota): the biggest lever on data/market.db size isn't the
# number of tickers, it's how much HISTORY each one pulls. `history_start_date`
# below caps every fetch to that date forward. At the current ~300 instruments
# and a 16-year cap, expect market.db to land somewhere around 60-90MB --
# comfortable headroom against a 512MB quota that's already ~250MB used by
# installed packages. If you add a lot more tickers, shorten this date first.
# ==============================================================================

gold_ticker: "GC=F"
gold_source: "yfinance"
history_start_date: "2010-01-01"   # nothing before this date is fetched or kept

