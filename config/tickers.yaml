# ==============================================================================
# SINGLE SOURCE OF TRUTH for every instrument this tool tracks.
#
# Both populate.py (the batch job that fetches data) and app.py (the API that
# serves it) load THIS file. Nothing is hardcoded in Python anymore, and
# nothing is duplicated between two files.
#
# This is seeded with a small representative set per category. Add rows freely
# — the pipeline doesn't care how many there are, it just fetches whatever is
# listed here. Re-run `python populate.py` after editing this file.
#
# Fields:
#   label      : human-readable name shown in the UI
#   ticker     : the symbol used to fetch price history
#   source     : "stooq" | "yfinance" | "fred"  (which fetcher owns this symbol)
#   stooq_kind : only needed when source=stooq -> "equity" | "fx" | "index"
#   commodity  : (sectors/currencies/country_etfs only) key into `commodities`
#                this instrument is expected to co-move with, for the
#                convergence/asymmetric-upside screen. Use null if none.
#   currency   : same idea, key into `currencies`. Use null if none (e.g. USD).
# ==============================================================================

gold_ticker: "GC=F"          # everything is priced in ounces of this
gold_source: "yfinance"      # Stooq doesn't carry COMEX gold futures reliably

