# FRED macro series (housing, farmland, commercial real estate, PPI inputs).
# These already worked well in the original build -- kept as-is, just moved
# out of hardcoded Python. Get a free key at https://fred.stlouisfed.org/docs/api/api_key.html
fred_series:
  - label: "S&P Case-Shiller National Home Price Index"
    series_id: "CSUSHPISA"
  - label: "Farm Real Estate Value"
    series_id: "FRBV"
  - label: "Green Street Commercial Property Price Index"
    series_id: "COMREPUSQ159N"
  - label: "Median Sales Price New Homes"
    series_id: "MSPUS"
