name: Refresh market data

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC daily -- adjust to taste
  workflow_dispatch: {}     # enables the manual "Run workflow" button

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run populate.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python populate.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.db
          git diff --staged --quiet || git commit -m "Refresh market data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
